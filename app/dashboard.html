<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard – …undbauen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/app.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=3.0.0"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body data-page="dashboard">
  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
  
  <!-- Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Layout -->
  <div id="mainLayout" class="main-layout">
    <header class="appHeader" role="banner">
      <div class="appHeaderInner">
        <button class="btn mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü öffnen" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
        </button>
        <a class="brand" href="dashboard.html" aria-label="…undbauen Dashboard">…undbauen</a>
        <div class="appRight">
          <div id="notificationBellContainer"></div>
          <button class="btn" id="themeToggle" aria-label="Theme wechseln" aria-pressed="false" title="Theme wechseln">🌓</button>
          <div class="userPill" aria-label="Benutzer-Informationen"><span class="dot" aria-hidden="true"></span><span id="userLabel">Member</span></div>
          <button class="btn" id="logoutBtn" aria-label="Ausloggen">⎋ Logout</button>
        </div>
      </div>
    </header>

    <main id="main-content" class="pageWrap" role="main">
    <div class="h2">Dashboard</div>
    <p class="p">Übersicht & nützliche Schritte</p>

    <!-- Quick Metrics Row -->
    <div id="quickMetricsRow" style="display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap;"></div>

    <!-- Widgets Row -->
    <div class="grid grid-3" style="margin-top: 20px">
      <div class="card kpiCard" id="cardNext"></div>
      <div class="card kpiCard" id="cardRecs"></div>
      <div class="card kpiCard" id="cardFavs"></div>
    </div>

    <!-- Aktivitäten & Idee einreichen -->
    <div class="grid grid-2" style="margin-top: 20px">
      <div class="card pane" id="cardActivity"></div>
      <div class="card pane" id="ticketCtaContainer"></div>
    </div>
    </main>
  </div>

  <!-- Modal for booked event details -->
  <div class="modalOverlay" id="bookedEventOverlay" style="display:none;">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHeader">
        <div class="modalTitle" id="bookedEventTitle">Termin Details</div>
        <button class="btn" id="bookedEventClose">✕</button>
      </div>
      <div class="modalBody" id="bookedEventBody"></div>
    </div>
  </div>

  <!-- Debug Console -->
  <div id="debug-console" style="position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font-family:monospace;font-size:11px;max-height:200px;overflow:auto;padding:10px;z-index:999999;border-top:2px solid #0f0;">
    <div style="color:#0ff;font-weight:bold;">DEBUG CONSOLE:</div>
  </div>
  
  <script>
    // Intercept all console methods
    const debugConsole = document.getElementById('debug-console');
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    function addToDebug(msg, color = '#0f0') {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.style.color = color;
      div.textContent = `[${time}] ${msg}`;
      debugConsole.appendChild(div);
      debugConsole.scrollTop = debugConsole.scrollHeight;
    }
    
    console.log = function(...args) {
      addToDebug(args.join(' '), '#0f0');
      originalLog.apply(console, args);
    };
    
    console.error = function(...args) {
      addToDebug('ERROR: ' + args.join(' '), '#f00');
      originalError.apply(console, args);
    };
    
    console.warn = function(...args) {
      addToDebug('WARN: ' + args.join(' '), '#fa0');
      originalWarn.apply(console, args);
    };
    
    // Catch all errors
    window.addEventListener('error', (e) => {
      addToDebug(`JS ERROR: ${e.message} at ${e.filename}:${e.lineno}`, '#f00');
    });
    
    window.addEventListener('unhandledrejection', (e) => {
      addToDebug(`PROMISE ERROR: ${e.reason}`, '#f00');
    });
    
    console.log('🔵 Debug console initialized');
  </script>
  
  <script type="module">
    (async () => {
      console.log('🔵 Module script started');
      
      try {
        console.log('🔵 Attempting to import app.js...');
        await import('../assets/js/app.js?v=3.0.1');
        console.log('✅ app.js imported successfully');
      } catch (error) {
        console.error('❌ Failed to import app.js:', error.message);
        console.error('Stack:', error.stack);
      }
    })();
  </script>
</body>
</html>
