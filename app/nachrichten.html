<!doctype html><html lang="de"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nachrichten – …undbauen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/><link rel="stylesheet" href="../assets/css/app.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=3.0.0"/>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head><body data-page="messages">
  <!-- Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Layout -->
  <div id="mainLayout" class="main-layout">
<header class="appHeader"><div class="appHeaderInner">
        <button class="btn mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü öffnen" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
        </button>
        <a class="brand" href="dashboard.html">…undbauen</a>

<div class="appRight">        <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>        <div class="userPill"><span class="dot"></span><span id="userLabel">Member</span></div>
  <button class="btn" id="logoutBtn">⎋ Logout</button>
</div>
</div></header>

    <main class="pageWrap">
  <div style="display:flex;justify-content:space-between;gap:10px;align-items:end;flex-wrap:wrap">
    <div>
      <div class="h2">Nachrichten</div>
      <p class="p">Inbox/Outbox (Threads) + Systemnachrichten.</p>
    </div>
    <a class="btn primary" href="neue-nachricht.html">Neue Nachricht</a>
  </div>

  <div class="messagesLayout" style="margin-top:14px">
    <div class="card pane">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
        <div class="h3" style="margin:0">Nachrichten</div>
        <button class="btn small" id="msgFilterToggle" title="Filter">🔍</button>
      </div>
      <div class="tabs" style="padding:0">
        <div class="tab active" data-msgtab="inbox">Inbox</div>
        <div class="tab" data-msgtab="system">System</div>
      </div>
      <div id="msgFilters" style="margin-top:12px; display:none; padding:12px; background:var(--bg); border-radius:var(--radius); border:1px solid var(--border)">
        <div style="font-weight:600; margin-bottom:8px; font-size:14px">Filter:</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap" id="msgFilterChips">
          <button class="filter-chip active" data-filter="all">Alle</button>
          <button class="filter-chip" data-filter="relevant">Relevant</button>
          <button class="filter-chip" data-filter="unread">Ungelesen</button>
          <button class="filter-chip" data-filter="contacts">Kontakte</button>
          <button class="filter-chip" data-filter="favorites">Favoriten</button>
        </div>
      </div>
      <input class="input" id="msgSearch" placeholder="Nachrichten durchsuchen..." style="margin-top:12px"/>
      <div style="margin-top:12px; display:grid; gap:10px" id="threadList"></div>
    </div>

    <div class="card pane" id="rightPane">
      <div class="p">Wähle links eine Unterhaltung oder Systemnachricht.</div>
    </div>
  </div>
    </main>
  </div>


<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script type="module" src="../assets/js/app.js?v=3.0.0"></script>
</body></html>
