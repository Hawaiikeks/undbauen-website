<!doctype html><html lang="de"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin – …undbauen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/><link rel="stylesheet" href="../assets/css/app.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=3.0.0"/>
</head><body data-page="admin">
  <!-- Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Layout -->
  <div id="mainLayout" class="main-layout">
<header class="appHeader"><div class="appHeaderInner">
        <button class="btn mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü öffnen" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
        </button>
        <a class="brand" href="dashboard.html">…undbauen</a>

<div class="appRight">        <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>        <div class="userPill"><span class="dot"></span><span id="userLabel">Admin</span></div>
  <button class="btn" id="logoutBtn">⎋ Logout</button>
</div>
</div></header>

    <main class="pageWrap">
  <div class="h2">Admin</div>
  <div class="adminTabs" style="margin-top:12px">
    <div class="tab active" data-admtab="users">Mitglieder</div>
    <div class="tab" data-admtab="events">Termine</div>
    <div class="tab" data-admtab="content">Content</div>
  </div>

  <div style="margin-top:14px">
    <div class="card pane" id="adminLeft" style="width:100%"></div>
    <div class="card pane" id="adminRight" style="display:none"></div>
  </div>

  <!-- Event modal -->
  <div class="modalOverlay" id="admEvOverlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHeader">
        <div class="modalTitle" id="admEvTitle">Event</div>
        <button class="btn" id="admEvClose">✕</button>
      </div>
      <div class="modalBody" id="admEvBody"></div>
    </div>
  </div>

  <!-- User modal -->
  <div class="modalOverlay" id="admUserOverlay" style="display:none">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHeader">
        <div class="modalTitle">Neues Mitglied</div>
        <button class="btn" id="admUserClose">✕</button>
      </div>
      <div class="modalBody">
        <label class="label">Name</label>
        <input class="input" id="newUserName" placeholder="Max Mustermann"/>
        <label class="label" style="margin-top:10px">Email</label>
        <input class="input" id="newUserEmail" type="email" placeholder="max@example.com"/>
        <label class="label" style="margin-top:10px">Passwort</label>
        <input class="input" id="newUserPassword" type="password" placeholder="Passwort"/>
        <label class="label" style="margin-top:10px">Rolle</label>
        <select class="input" id="newUserRole">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
          <option value="author">Author</option>
        </select>
        <div class="err" id="newUserErr"></div>
        <div style="margin-top:12px">
          <button class="btn primary" id="newUserSave">Speichern</button>
          <button class="btn" id="newUserCancel" style="margin-left:8px">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>
    </main>
  </div>


<script type="module" src="../assets/js/app.js?v=3.0.0"></script>
</body></html>
