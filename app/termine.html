  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/>

</head>
<body data-page="termine">
  <!-- Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Layout -->
  <div id="mainLayout" class="main-layout">
    <header class="appHeader">
      <div class="appHeaderInner">
        <button class="btn mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü öffnen" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>

        <a class="brand" href="dashboard.html">…undbauen</a>
        <div class="appRight">
          <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>

          <button class="btn" id="logoutBtn">⎋ Logout</button>

      </div>
    </header>

    <main class="pageWrap">

      <div>
        <div class="h2">Termine</div>
        <p class="p">Buchen, speichern, ICS exportieren. Event-Thread & Teilnehmerliste sind integriert.</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap">
        <button class="btn" id="exportBooked">Alle gebuchten (ICS)</button>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:14px" id="eventsGrid"></div>

    <!-- Modal -->
    <div class="modalOverlay" id="evOverlay">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modalHeader">
          <div class="modalTitle" id="evTitle">Event</div>
          <button class="btn" id="evClose">✕</button>
        </div>
        <div class="modalBody" id="evBody"></div>
      </div>
    </div>
    </main>
  </div>

  <script type="module" src="../assets/js/app.js?v=3.0.0"></script>
