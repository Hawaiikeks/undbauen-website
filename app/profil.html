<!doctype html><html lang="de"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mein Profil – …undbauen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/base.css"/><link rel="stylesheet" href="../assets/css/app.css"/>
</head><body data-page="profile">
<header class="appHeader"><div class="container appHeaderInner">
<a class="brand" href="dashboard.html">…undbauen</a>
<nav class="appNav" id="appNav">
  <a href="dashboard.html" data-nav="dashboard">Dashboard</a>
  <a href="termine.html" data-nav="termine">Termine</a>
  <a href="forum.html" data-nav="forum">Forum</a>
  <a href="nachrichten.html" data-nav="nachrichten">Nachrichten</a>
  <a href="mitglieder.html" data-nav="mitglieder">Mitglieder</a>
  <a href="einstellungen.html" data-nav="einstellungen">Einstellungen</a>
  <a href="admin.html" data-nav="admin" id="adminLink" style="display:none">Admin</a>
</nav>
<div class="appRight">        <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>        <div class="userPill"><span class="dot"></span><span id="userLabel">Member</span></div>
  <button class="btn" id="logoutBtn">⎋ Logout</button>
</div>
</div></header>

<main class="container pageWrap">
  <div class="h2">Mein Profil</div>
  <div class="grid grid-2" style="margin-top:14px">
    <div class="card pane">
      <label class="label">Headline</label>
      <input class="input" id="pHeadline"/>
      <label class="label" style="margin-top:10px">Location</label>
      <input class="input" id="pLoc"/>
      <label class="label" style="margin-top:10px">Bio (max 500)</label>
      <textarea class="textarea" id="pBio"></textarea>
    </div>

    <div class="card pane">
      <label class="label">Skills (Komma)</label>
      <input class="input" id="pSkills" placeholder="BIM, IFC, Automation"/>
      <label class="label" style="margin-top:10px">Interessen (Komma)</label>
      <input class="input" id="pInterests" placeholder="AEC, Standards, Nachhaltigkeit"/>
      <label class="label" style="margin-top:10px">Biete</label>
      <textarea class="textarea" id="pOffer"></textarea>
      <label class="label" style="margin-top:10px">Suche</label>
      <textarea class="textarea" id="pSeek"></textarea>

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label class="label">LinkedIn</label>
          <input class="input" id="pLi" placeholder="https://linkedin.com/in/..."/>
        </div>
        <div style="flex:1">
          <label class="label">Website</label>
          <input class="input" id="pWeb" placeholder="https://..."/>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label class="label">Instagram</label>
          <input class="input" id="pInsta" placeholder="@username"/>
        </div>
        <div style="flex:1">
          <label class="label">X / Twitter</label>
          <input class="input" id="pX" placeholder="@username"/>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <label class="badge"><input type="checkbox" id="pVis"/> sichtbar im Directory</label>
        <label class="badge"><input type="checkbox" id="pDM"/> DM erlauben</label>
      </div>

      <div class="err" id="pErr"></div>
      <div class="okmsg" id="pOk"></div>
      <div style="margin-top:12px">
        <button class="btn primary" id="saveProfile">Speichern</button>
      </div>
    </div>
  </div>
</main>

<script type="module" src="../assets/js/app.js"></script>
</body></html>
