<!doctype html><html lang="de"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mein Profil – …undbauen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/><link rel="stylesheet" href="../assets/css/app.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=3.0.0"/>
</head><body data-page="profile">
  <!-- Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Layout -->
  <div id="mainLayout" class="main-layout">
<header class="appHeader"><div class="appHeaderInner">
        <button class="btn mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü öffnen" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
        </button>
        <a class="brand" href="dashboard.html">…undbauen</a>

<div class="appRight">        <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>        <div class="userPill"><span class="dot"></span><span id="userLabel">Member</span></div>
  <button class="btn" id="logoutBtn">⎋ Logout</button>
</div>
</div></header>

    <main class="pageWrap">
  <div class="h2">Mein Profil</div>
  <div id="profileProgress" class="profile-progress-container"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div></div>
    <button class="btn primary" id="saveProfileTop">Profil speichern</button>
  </div>
  <div class="card pane mt-md">
    <label class="label">Profilbild</label>
    <div id="avatarSelector" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:12px;"></div>
  </div>
  
  <div class="grid grid-2 mt-md">
    <div class="card pane">
      <label class="label">Headline</label>
      <input class="input" id="pHeadline"/>
      <label class="label mt-md">Location</label>
      <input class="input" id="pLoc"/>
      <label class="label mt-md">Bio (max 500)</label>
      <textarea class="textarea" id="pBio"></textarea>
    </div>

    <div class="card pane">
      <label class="label">Skills (Komma)</label>
      <input class="input" id="pSkills" placeholder="BIM, IFC, Automation"/>
      <label class="label mt-md">Interessen (Komma)</label>
      <input class="input" id="pInterests" placeholder="AEC, Standards, Nachhaltigkeit"/>
      <label class="label mt-md">Biete</label>
      <textarea class="textarea" id="pOffer"></textarea>
      <label class="label mt-md">Suche</label>
      <textarea class="textarea" id="pSeek"></textarea>

      <div class="row mt-md">
        <div class="flex-1">
          <label class="label">LinkedIn</label>
          <input class="input" id="pLi" placeholder="https://linkedin.com/in/..."/>
        </div>
        <div class="flex-1">
          <label class="label">Website</label>
          <input class="input" id="pWeb" placeholder="https://..."/>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label class="label">Instagram</label>
          <input class="input" id="pInsta" placeholder="@username"/>
        </div>
        <div style="flex:1">
          <label class="label">X / Twitter</label>
          <input class="input" id="pX" placeholder="@username"/>
        </div>
      </div>

      <div class="row mt-md">
        <label class="badge"><input type="checkbox" id="pVis"/> sichtbar im Directory</label>
        <label class="badge"><input type="checkbox" id="pDM"/> DM erlauben</label>
      </div>

      <div class="err" id="pErr"></div>
      <div class="okmsg" id="pOk"></div>
      <div class="mt-md">
        <button class="btn primary" id="saveProfile">Speichern</button>
      </div>
    </div>
  </div>
    </main>
  </div>


<script type="module" src="../assets/js/app.js?v=3.0.0"></script>
</body></html>
