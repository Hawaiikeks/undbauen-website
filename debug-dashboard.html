<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Dashboard Problem</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .log {
            padding: 5px;
            margin: 2px 0;
            border-left: 3px solid #666;
        }
        .error { border-color: #f48771; color: #f48771; }
        .success { border-color: #89d185; color: #89d185; }
        .info { border-color: #6796e6; color: #6796e6; }
        .warning { border-color: #ffc107; color: #ffc107; }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007acc;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🐛 Dashboard Debug</h1>
    <button onclick="testLogin()">1. Test Login</button>
    <button onclick="testSession()">2. Test Session</button>
    <button onclick="testAPI()">3. Test API</button>
    <button onclick="openDashboard()">4. Öffne Dashboard</button>
    <button onclick="clearStorage()">❌ Clear Storage</button>
    <div id="log"></div>

    <script type="module">
        const log = document.getElementById('log');
        
        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(div);
        }

        window.clearStorage = function() {
            localStorage.clear();
            sessionStorage.clear();
            addLog('✅ Storage gelöscht', 'success');
        };

        window.testLogin = async function() {
            try {
                addLog('🔍 Importiere API Client...', 'info');
                const { api } = await import('/assets/js/services/apiClient.js');
                addLog('✅ API Client importiert', 'success');
                
                addLog('🔍 Teste Login...', 'info');
                const result = api.login('admin@undbauen.local', 'adminadmin');
                addLog(`Login Result: ${JSON.stringify(result)}`, result.ok ? 'success' : 'error');
                
                if (result.ok) {
                    addLog('✅ Login erfolgreich!', 'success');
                    addLog('📝 Session gespeichert', 'info');
                } else {
                    addLog(`❌ Login fehlgeschlagen: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Fehler: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.testSession = async function() {
            try {
                addLog('🔍 Prüfe Session...', 'info');
                const { api } = await import('/assets/js/services/apiClient.js');
                
                const isLoggedIn = api.isLoggedIn();
                addLog(`isLoggedIn: ${isLoggedIn}`, isLoggedIn ? 'success' : 'warning');
                
                if (isLoggedIn) {
                    const user = api.me();
                    addLog(`User: ${JSON.stringify(user)}`, 'info');
                    addLog(`Name: ${user?.name}`, 'info');
                    addLog(`Email: ${user?.email}`, 'info');
                    addLog(`Role: ${user?.role}`, 'info');
                } else {
                    addLog('⚠️ Nicht eingeloggt', 'warning');
                }
                
                // Prüfe localStorage direkt
                const session = localStorage.getItem('session');
                addLog(`localStorage.session: ${session ? 'vorhanden' : 'nicht vorhanden'}`, session ? 'success' : 'warning');
                if (session) {
                    addLog(`Session Data: ${session}`, 'info');
                }
            } catch (error) {
                addLog(`❌ Fehler: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.testAPI = async function() {
            try {
                addLog('🔍 Teste API Funktionen...', 'info');
                const { api } = await import('/assets/js/services/apiClient.js');
                
                // Test verschiedene API Funktionen
                addLog('Test 1: api.listEvents()', 'info');
                try {
                    const events = api.listEvents();
                    addLog(`✅ Events: ${events?.length || 0} gefunden`, 'success');
                } catch (e) {
                    addLog(`❌ Events Error: ${e.message}`, 'error');
                }
                
                addLog('Test 2: api.listMembers()', 'info');
                try {
                    const members = api.listMembers('');
                    addLog(`✅ Members: ${members?.length || 0} gefunden`, 'success');
                } catch (e) {
                    addLog(`❌ Members Error: ${e.message}`, 'error');
                }
                
                addLog('Test 3: api.listForumCategories()', 'info');
                try {
                    const categories = api.listForumCategories();
                    addLog(`✅ Forum Categories: ${categories?.length || 0} gefunden`, 'success');
                } catch (e) {
                    addLog(`❌ Forum Error: ${e.message}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Fehler: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.openDashboard = function() {
            addLog('🚀 Öffne Dashboard...', 'info');
            window.open('/app/dashboard.html', '_blank');
        };

        // Initial Check
        addLog('🔍 Debug-Tool geladen', 'success');
        addLog('Server: http://localhost:8000', 'info');
        
        // Auto-Check
        setTimeout(async () => {
            try {
                const { api } = await import('/assets/js/services/apiClient.js');
                const isLoggedIn = api.isLoggedIn();
                if (isLoggedIn) {
                    const user = api.me();
                    addLog(`✅ Auto-Check: Eingeloggt als ${user?.name} (${user?.role})`, 'success');
                } else {
                    addLog('⚠️ Auto-Check: Nicht eingeloggt', 'warning');
                }
            } catch (e) {
                addLog(`❌ Auto-Check Error: ${e.message}`, 'error');
            }
        }, 500);
    </script>
</body>
</html>
