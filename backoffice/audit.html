<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Aktivitätsprotokoll – …undbauen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/app.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/sidebar.css?v=3.0.0"/>
</head>
<body data-page="audit">
  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
  
  <!-- Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Layout -->
  <div id="mainLayout" class="main-layout">
    <header class="appHeader" role="banner">
      <div class="appHeaderInner">
        <button class="btn mobile-menu-btn" id="mobileMenuBtn" aria-label="Menü öffnen" style="display: none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
        </button>
        <a class="brand" href="../app/dashboard.html" aria-label="…undbauen Dashboard">…undbauen</a>
        <div class="appRight">
          <div id="notificationBellContainer"></div>
          <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>
          <div class="userPill"><span class="dot"></span><span id="userLabel">Admin</span></div>
          <button class="btn" id="logoutBtn">⎋ Logout</button>
        </div>
      </div>
    </header>

    <main id="main-content" id="auditContainer" class="pageWrap">
      <!-- Content will be rendered by audit.js -->
    </main>
  </div>

  <script type="module" src="../assets/js/app.js?v=3.0.0"></script>
  <script type="module">
    import { renderAudit } from '../assets/js/pages/audit.js';
    import { api } from '../assets/js/services/apiClient.js';
    import { hasRole } from '../assets/js/services/authGuard.js';
    
    // Wait for DOM to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAudit);
    } else {
      initAudit();
    }
    
    function initAudit() {
      // Check auth and role (admin only)
      if (!api.isLoggedIn()) {
        window.location.href = '../index.html';
      } else if (!hasRole('admin')) {
        window.location.href = '../app/dashboard.html';
      } else {
        setTimeout(() => {
          renderAudit();
        }, 100);
      }
    }
  </script>
</body>
</html>
