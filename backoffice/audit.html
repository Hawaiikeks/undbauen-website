<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Audit Log – …undbauen Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="../assets/css/base.css?v=3.0.0"/>
  <link rel="stylesheet" href="../assets/css/app.css?v=3.0.0"/>
</head>
<body data-page="audit">
  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
  <header class="appHeader" role="banner">
    <div class="container appHeaderInner">
      <a class="brand" href="index.html" aria-label="…undbauen Backoffice">…undbauen Backoffice</a>
      <nav class="appNav" id="appNav" aria-label="Hauptnavigation" role="navigation">
        <a href="index.html" data-nav="backoffice">Dashboard</a>
        <a href="inbox.html" data-nav="inbox">Inbox</a>
        <a href="reports.html" data-nav="reports">Reports</a>
        <a href="content.html" data-nav="content">Content</a>
        <a href="events.html" data-nav="events">Events</a>
        <a href="public-pages.html" data-nav="public-pages">Public Pages</a>
        <a href="resources.html" data-nav="resources">Resources</a>
        <a href="knowledge.html" data-nav="knowledge">Knowledge</a>
        <a href="users.html" data-nav="users" id="adminLink">Users</a>
        <a href="audit.html" data-nav="audit" aria-current="page" id="adminLink2">Audit</a>
      </nav>
      <div class="appRight">
        <button class="btn" id="themeToggle" title="Theme wechseln">🌓</button>
        <div class="userPill"><span class="dot"></span><span id="userLabel">Admin</span></div>
        <button class="btn" id="logoutBtn">⎋ Logout</button>
      </div>
    </div>
  </header>

  <main id="auditContainer" class="container pageWrap">
    <!-- Content will be rendered by audit.js -->
  </main>

  <script type="module">
    import { renderAudit } from '../assets/js/pages/audit.js';
    import { api } from '../assets/js/services/apiClient.js';
    import { hasRole } from '../assets/js/services/authGuard.js';
    
    // Check auth and role (admin only)
    if (!api.isLoggedIn()) {
      window.location.href = '../index.html';
    } else if (!hasRole('admin')) {
      window.location.href = '../app/dashboard.html';
    } else {
      renderAudit();
    }
  </script>
  <script type="module" src="../assets/js/app.js?v=3.0.0"></script>
</body>
</html>
