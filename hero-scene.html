<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>undBau Hero Scene</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, textMesh, personIcons = [];
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x2563EB, 2);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // Create Person Icons (3 items looking like "i")
            const personGroup = new THREE.Group();
            for (let i = 0; i < 3; i++) {
                const group = new THREE.Group();
                
                // Dot (Head)
                const headGeo = new THREE.SphereGeometry(0.15, 32, 32);
                const headMat = new THREE.MeshPhongMaterial({ color: 0x2563EB });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 0.6;
                group.add(head);

                // Body (Cylinder)
                const bodyGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 32);
                const bodyMat = new THREE.MeshPhongMaterial({ color: 0x2563EB });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                group.add(body);

                group.position.x = (i - 1) * 1.5;
                personIcons.push(group);
                personGroup.add(group);
            }
            personGroup.position.x = -3.5;
            scene.add(personGroup);

            // Load Font and Create 3D Text
            const loader = new FontLoader();
            // Use a default typeface from three.js repo
            loader.load('https://unpkg.com/three@0.156.1/examples/fonts/helvetiker_regular.typeface.json', function (font) {
                const textGeo = new TextGeometry('undBau', {
                    font: font,
                    size: 1.2,
                    height: 0.3,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.03,
                    bevelSize: 0.02,
                    bevelOffset: 0,
                    bevelSegments: 5
                });

                const textMat = new THREE.MeshPhongMaterial({ color: 0x2563EB });
                textMesh = new THREE.Mesh(textGeo, textMat);
                
                // Center text
                textGeo.computeBoundingBox();
                const centerOffset = -0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);
                textMesh.position.x = 0;
                textMesh.position.y = -0.6;
                scene.add(textMesh);
            });

            window.addEventListener('resize', onWindowResize, false);
            
            // Sync theme
            updateTheme();
            // Check for theme changes from parent
            window.addEventListener('message', (event) => {
                if (event.data.type === 'theme-change') {
                    updateTheme(event.data.theme);
                }
            });
        }

        function updateTheme(theme) {
            // If theme not provided, try to detect from body class or parent
            if (!theme) {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                theme = isDark ? 'dark' : 'light';
            }
            
            const color = theme === 'dark' ? 0x3B82F6 : 0x2563EB;
            
            scene.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(color);
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            personIcons.forEach((icon, i) => {
                icon.position.y = Math.sin(time + i) * 0.2;
                icon.rotation.y = time * 0.5;
            });

            if (textMesh) {
                textMesh.rotation.y = Math.sin(time * 0.5) * 0.1;
                textMesh.position.y = -0.6 + Math.cos(time) * 0.05;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
